<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4 Colores</title>
  </head>
  <body tabindex="0">
    <!-- Divs de colores -->
    <div id="azul" style="width: 200px; height: 200px; background-color: blue"></div>
    <div id="rojo" style="width: 200px; height: 200px; background-color: red"></div>
    <div id="verde" style="width: 200px; height: 200px; background-color: green"></div>
    <div id="amarillo" style="width: 200px; height: 200px; background-color: yellow"></div>

    <!-- Div que cambia con teclas -->
    <div
      id="key"
      style="width: 200px; height: 200px; background-color: white; border: 1px solid black"
    ></div>

    <script>
      // Selecciono los divs de colores
      const azul = document.getElementById("azul");
      const rojo = document.getElementById("rojo");
      const verde = document.getElementById("verde");
      const amarillo = document.getElementById("amarillo");

      // Funcion para pintar negro
      function pintarNegro(elemento) {
        elemento.style.backgroundColor = "black";
      }

      // Click para cambiar a negro
      azul.addEventListener("click", function () {
        pintarNegro(azul);
      });

      rojo.addEventListener("click", function () {
        pintarNegro(rojo);
      });

      verde.addEventListener("click", function () {
        pintarNegro(verde);
      });

      amarillo.addEventListener("click", function () {
        pintarNegro(amarillo);
      });

      // Variable global para guardar el color
      let color = "";

      // Selecciono el div key
      const key = document.getElementById("key");

      // Funcion para crear un div nuevo
      function crearDiv(colorNuevo) {
        const nuevoDiv = document.createElement("div");
        nuevoDiv.style.width = "200px";
        nuevoDiv.style.height = "200px";
        nuevoDiv.style.backgroundColor = colorNuevo;
        document.body.appendChild(nuevoDiv);
      }

      // Evento del teclado
      document.addEventListener("keydown", function (event) {
        // Guardo la tecla en minuscula
        const tecla = event.key.toLowerCase();

        if (tecla === "a") {
          color = "pink";
          key.style.backgroundColor = color;
        } else if (tecla === "s") {
          color = "orange";
          key.style.backgroundColor = color;
        } else if (tecla === "d") {
          color = "skyblue";
          key.style.backgroundColor = color;
        } else if (tecla === "q") {
          crearDiv("purple");
        } else if (tecla === "w") {
          crearDiv("gray");
        } else if (tecla === "e") {
          crearDiv("brown");
        }
      });

      // Dejo la pagina lista para escuchar teclas
      document.body.focus();
    </script>
  </body>
</html>
